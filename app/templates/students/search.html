{% extends "base.html" %}
{% block title %}Recherche étudiants{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 px-6 py-4 flex justify-between items-center">
        <h2 class="text-2xl font-bold text-white">Résultats pour "{{ query }}"</h2>
        <a href="{{ url_for('students.list') }}" class="text-white hover:text-indigo-200"><i class="fas fa-arrow-left mr-1"></i> Retour</a>
    </div>
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                    <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for student in results %}
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">{{ student.id }}</td>
                    <td class="px-6 py-4 font-medium">{{ student.name }}</td>
                    <td class="px-6 py-4 text-gray-500">{{ student.email }}</td>
                    <td class="px-6 py-4 text-center">
                        <a href="{{ url_for('students.edit', id=student.id) }}" class="text-indigo-600 hover:text-indigo-900 mx-1"><i class="fas fa-edit"></i></a>
                        <a href="{{ url_for('students.delete', id=student.id) }}" class="text-red-600 hover:text-red-900 mx-1" onclick="return confirm('Supprimer ?')"><i class="fas fa-trash-alt"></i></a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">Aucun résultat.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
