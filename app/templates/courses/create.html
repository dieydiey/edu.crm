{% extends "base.html" %}
{% block title %}Créer un cours{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 px-6 py-4">
        <h2 class="text-2xl font-bold text-white">Nouveau cours</h2>
    </div>
    <div class="p-6">
        <form method="POST">
            <div class="mb-4"><label class="block font-semibold">Titre</label><input type="text" name="title" required class="w-full border rounded-lg p-2"></div>
            <div class="mb-4"><label class="block font-semibold">Enseignant</label><select name="teacher_id" required class="w-full border rounded-lg p-2">{% for t in teachers %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}</select></div>
            <div class="mb-4"><label class="block font-semibold">Classe</label><select name="class_id" required class="w-full border rounded-lg p-2">{% for c in classes %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
            <div class="mb-4"><label class="block font-semibold">Jour</label><select name="day" class="w-full border rounded-lg p-2"><option>Lundi</option><option>Mardi</option><option>Mercredi</option><option>Jeudi</option><option>Vendredi</option><option>Samedi</option></select></div>
            <div class="mb-4"><label class="block font-semibold">Horaire</label><input type="text" name="time" placeholder="10h-12h" required class="w-full border rounded-lg p-2"></div>
            <div class="mb-4"><label class="block font-semibold">Salle</label><input type="text" name="room" placeholder="A101" required class="w-full border rounded-lg p-2"></div>
            <div class="mb-6"><label class="block font-semibold">Mode</label><select name="mode" class="w-full border rounded-lg p-2"><option>Présentiel</option><option>Distanciel</option></select></div>
            <div class="flex justify-between">
                <a href="{{ url_for('courses.list') }}" class="bg-gray-300 px-4 py-2 rounded-lg">Annuler</a>
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">Créer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
