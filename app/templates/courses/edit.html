{% extends "base.html" %}
{% block title %}Modifier un cours{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 px-6 py-4">
        <h2 class="text-2xl font-bold text-white">Modifier le cours</h2>
    </div>
    <div class="p-6">
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Titre</label>
                <input type="text" name="title" value="{{ course.title }}" required class="w-full px-3 py-2 border rounded-lg">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Enseignant</label>
                <select name="teacher_id" required class="w-full px-3 py-2 border rounded-lg">
                    {% for teacher in teachers %}
                    <option value="{{ teacher.id }}" {% if teacher.id == course.teacher_id %}selected{% endif %}>{{ teacher.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Jour</label>
                <select name="day" required class="w-full px-3 py-2 border rounded-lg">
                    {% for day in ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'] %}
                    <option value="{{ day }}" {% if course.schedule.day == day %}selected{% endif %}>{{ day }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Horaire</label>
                <input type="text" name="time" value="{{ course.schedule.time }}" placeholder="8h-10h" required class="w-full px-3 py-2 border rounded-lg">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">Salle</label>
                <input type="text" name="room" value="{{ course.schedule.room }}" placeholder="A101" required class="w-full px-3 py-2 border rounded-lg">
            </div>
            <div class="flex justify-between">
                <a href="{{ url_for('courses.list') }}" class="bg-gray-300 px-4 py-2 rounded-lg">Annuler</a>
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Enregistrer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
