{% extends "base.html" %}
{% block title %}Inscrire étudiant{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 px-6 py-4">
        <h2 class="text-2xl font-bold text-white"><i class="fas fa-user-plus mr-3"></i> Inscription au cours</h2>
        <p class="text-indigo-200">{{ course.title }}</p>
    </div>
    <div class="p-6">
        <form method="POST">
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Choisir un étudiant</label>
                <select name="student_id" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">-- Sélectionnez --</option>
                    {% for student in students %}
                    <option value="{{ student.id }}">{{ student.name }} ({{ student.email }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="flex justify-between">
                <a href="{{ url_for('courses.list') }}" class="bg-gray-300 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-400">Annuler</a>
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Inscrire</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
