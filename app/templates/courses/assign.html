{% extends "base.html" %}
{% block title %}Inscrire un étudiant{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-4 text-center">Inscription au cours : {{ course.title }}</h2>
    <form method="POST">
        <div class="mb-6">
            <label class="block text-gray-700 mb-2">Choisir un étudiant</label>
            <select name="student_id" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">-- Sélectionnez un étudiant --</option>
                {% for student in students %}
                <option value="{{ student.id }}">{{ student.name }} ({{ student.email }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex justify-between">
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Inscrire</button>
            <a href="{{ url_for('courses.list') }}" class="bg-gray-300 text-gray-800 px-4 py-2 rounded hover:bg-gray-400">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
