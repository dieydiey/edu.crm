{% extends "base.html" %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md transform transition-all">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-100 rounded-full mb-4">
                <i class="fas fa-lock-open text-3xl text-indigo-600"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-800">Bienvenue</h2>
            <p class="text-gray-500 mt-2">Connectez-vous à votre espace</p>
        </div>
        <form method="POST">
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-3 text-gray-400"></i>
                    <input type="email" name="email" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Mot de passe</label>
                <div class="relative">
                    <i class="fas fa-key absolute left-3 top-3 text-gray-400"></i>
                    <input type="password" name="password" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-800 text-white py-2 rounded-lg hover:from-indigo-700 hover:to-indigo-900 transition transform hover:scale-[1.02]">
                <i class="fas fa-sign-in-alt mr-2"></i> Se connecter
            </button>
        </form>
        <div class="text-center mt-6">
            <p class="text-gray-600">Pas encore de compte ? <a href="{{ url_for('auth.register') }}" class="text-indigo-600 font-semibold hover:underline">Inscrivez-vous</a></p>
        </div>
    </div>
</div>
{% endblock %}
