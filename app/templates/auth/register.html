{% extends "base.html" %}
{% block title %}Inscription{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Créer un compte</h2>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Nom complet</label>
            <input type="text" name="name" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Email</label>
            <input type="email" name="email" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Mot de passe</label>
            <input type="password" name="password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 mb-2">Confirmer le mot de passe</label>
            <input type="password" name="confirm_password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">S'inscrire</button>
    </form>
    <p class="mt-4 text-center text-gray-600">Déjà un compte ? <a href="{{ url_for('auth.login') }}" class="text-indigo-600 hover:underline">Connectez-vous</a></p>
</div>
{% endblock %}
