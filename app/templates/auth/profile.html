{% extends "base.html" %}
{% block title %}Mon profil{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded-lg shadow">
    <h2 class="text-2xl font-bold mb-6 text-center">Mon profil</h2>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Nom</label>
            <input type="text" name="name" value="{{ user.name }}" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Email</label>
            <input type="email" name="email" value="{{ user.email }}" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="border-t pt-4 mt-4">
            <h3 class="text-lg font-semibold mb-4">Changer le mot de passe (optionnel)</h3>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Mot de passe actuel</label>
                <input type="password" name="current_password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nouveau mot de passe</label>
                <input type="password" name="new_password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Confirmer le nouveau mot de passe</label>
                <input type="password" name="confirm_new_password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">Mettre à jour</button>
    </form>
</div>
{% endblock %}
