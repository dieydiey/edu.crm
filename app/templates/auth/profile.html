{% extends "base.html" %}
{% block title %}Mon profil{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 px-6 py-8 text-white">
            <div class="flex items-center space-x-4">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center text-indigo-600 text-4xl">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">{{ user.name }}</h1>
                    <p class="text-indigo-200">{{ user.email }}</p>
                </div>
            </div>
        </div>
        <div class="p-6">
            <form method="POST">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Informations personnelles</h2>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Nom</label>
                    <input type="text" name="name" value="{{ user.name }}" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Email</label>
                    <input type="email" name="email" value="{{ user.email }}" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <div class="border-t pt-6 mt-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">Changer le mot de passe</h2>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-semibold mb-2">Mot de passe actuel</label>
                        <input type="password" name="current_password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-semibold mb-2">Nouveau mot de passe</label>
                        <input type="password" name="new_password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-semibold mb-2">Confirmer le nouveau mot de passe</label>
                        <input type="password" name="confirm_new_password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="flex justify-between items-center">
                    <a href="{{ url_for('dashboard.index') }}" class="text-gray-600 hover:text-gray-800"><i class="fas fa-arrow-left mr-1"></i> Retour</a>
                    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition transform hover:scale-105">
                        <i class="fas fa-save mr-1"></i> Mettre à jour
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
