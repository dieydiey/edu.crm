{% extends "base.html" %}
{% block title %}Créer une classe{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 px-6 py-4">
        <h2 class="text-2xl font-bold text-white">Nouvelle classe</h2>
    </div>
    <div class="p-6">
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold mb-2">Nom de la classe</label>
                <input type="text" name="name" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">Description (optionnel)</label>
                <textarea name="description" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
            <div class="flex justify-between">
                <a href="{{ url_for('classes.list') }}" class="bg-gray-300 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-400">Annuler</a>
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">Créer</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
