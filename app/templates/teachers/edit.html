{% extends "base.html" %}
{% block title %}Modifier enseignant{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-indigo-600 to-indigo-800 px-6 py-4">
        <h2 class="text-2xl font-bold text-white">Modifier enseignant</h2>
    </div>
    <div class="p-6">
        <form method="POST">
            <div class="mb-4"><label class="block font-semibold">Nom</label><input type="text" name="name" value="{{ teacher.name }}" required class="w-full border rounded-lg p-2"></div>
            <div class="mb-4"><label class="block font-semibold">Email</label><input type="email" name="email" value="{{ teacher.email }}" required class="w-full border rounded-lg p-2"></div>
            <div class="mb-6"><label class="block font-semibold">Spécialités (séparées par des virgules)</label><input type="text" name="specialities" value="{{ teacher.specialities|join(', ') }}" required class="w-full border rounded-lg p-2"></div>
            <div class="flex justify-between"><a href="{{ url_for('teachers.list') }}" class="bg-gray-300 px-4 py-2 rounded-lg">Annuler</a><button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg">Enregistrer</button></div>
        </form>
    </div>
</div>
{% endblock %}
